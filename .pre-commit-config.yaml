repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/linux/ # bash only — windows/ uses .ps1, templates/ linted manually

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]

  - repo: local
    hooks:
      - id: prettier
        name: prettier (shell + markdown)
        language: system
        entry: bash -c 'prettier --write --plugin "$(npm root -g)/prettier-plugin-sh/lib/index.cjs" "$@"' --
        files: \.(sh|md)$

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: bash -c 'for f in "$@"; do pwsh -NoProfile -Command "Invoke-ScriptAnalyzer -Path \"$f\" -EnableExit"; done' --
        types: [file]
        files: \.ps1$
