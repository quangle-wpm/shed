# This file is managed by quangle-wpm/config. Do not edit.
repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier (shell + markdown)
        language: system
        entry: bash -c 'prettier --write --plugin "$(npm root -g)/prettier-plugin-sh/lib/index.cjs" "$@"' --
        files: \.(sh|md)$
      - id: prettier-ps1
        name: prettier (powershell)
        language: system
        entry: bash -c 'for f in "$@"; do pwsh -NoProfile -Command "[System.IO.File]::WriteAllText(\"$f\", (Invoke-Formatter -ScriptDefinition (Get-Content \"$f\" -Raw)).TrimEnd() + [char]10)"; done' --
        files: \.ps1$
        types: [file]
      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: bash -c 'for f in "$@"; do pwsh -NoProfile -Command "Invoke-ScriptAnalyzer -Path \"$f\" -EnableExit"; done' --
        files: \.ps1$
        types: [file]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        args: [
  "--config",
  ".markdownlint.json"
]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

