repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier (shell + markdown)
        language: system
        entry: bash -c 'prettier --write --plugin "$(npm root -g)/prettier-plugin-sh/lib/index.cjs" "$@"' --
        files: \.(sh|md)$

      - id: prettier-ps1
        name: prettier (powershell)
        language: system
        entry: bash -c 'for f in "$@"; do pwsh -NoProfile -Command "Set-Content $f (Invoke-Formatter -ScriptDefinition (Get-Content $f -Raw))"; done' --
        types: [file]
        files: \.ps1$

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: bash -c 'for f in "$@"; do pwsh -NoProfile -Command "Invoke-ScriptAnalyzer -Path \"$f\" -EnableExit"; done' --
        types: [file]
        files: \.ps1$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/linux/ # bash only — windows/ uses .ps1, templates/ linted manually

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
