name: Sync config to garden

on:
    push:
        branches: [main]

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Sync to garden
              run: python3 .github/scripts/sync-to-garden.py
              env:
                  GARDEN_TOKEN: ${{ secrets.GARDEN_TOKEN }}
