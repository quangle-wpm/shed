name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Markdownlint
        run: npx markdownlint-cli2 "**/*.md"

      - name: Prettier check
        run: npx prettier --check .
